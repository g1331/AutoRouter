version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3331:3000"
    environment:
      - DATABASE_URL=postgresql://autorouter:autorouter@db:5432/autorouter
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_RETENTION_DAYS=90
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=autorouter
      - POSTGRES_PASSWORD=autorouter
      - POSTGRES_DB=autorouter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autorouter"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional local CLIProxyAPI sidecar. It is disabled unless the profile is selected:
  #   docker compose -f docker-compose.yaml --profile cliproxyapi up -d
  # Set CLIPROXYAPI_IMAGE to the image built from the upstream CLIProxyAPI project.
  # app connects through the Docker network at http://cliproxyapi:8317/v1 and
  # http://cliproxyapi:8317/v0/management after the admin connection is saved.
  # cliproxyapi:
  #   image: ${CLIPROXYAPI_IMAGE}
  #   profiles: ["cliproxyapi"]
  #   ports:
  #     - "${CLIPROXYAPI_PORT:-8317}:8317"
  #   environment:
  #     - CLIENT_API_KEY=${CLIPROXYAPI_CLIENT_API_KEY}
  #     - MANAGEMENT_SECRET=${CLIPROXYAPI_MANAGEMENT_SECRET}
  #     - OUTBOUND_PROXY_URL=${CLIPROXYAPI_OUTBOUND_PROXY_URL:-}
  #   volumes:
  #     - cliproxyapi_auth:/app/auth-dir
  #     - cliproxyapi_config:/app/config
  #   restart: unless-stopped

volumes:
  postgres_data:
  # cliproxyapi_auth:
  # cliproxyapi_config:
