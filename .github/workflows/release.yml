name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: g1331/autorouter

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          ACTUAL_TAG="${GITHUB_REF_NAME}"

          if [[ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Tag ${ACTUAL_TAG} does not match package.json version ${EXPECTED_TAG}"
            exit 1
          fi

          git fetch origin master --depth=1
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/master"; then
            echo "::error::Release tag must point to a commit contained in origin/master"
            exit 1
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          DB_TYPE: postgres
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm build

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          shellcheck: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > generated-release-notes.md

      - name: Build release body and metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > release-body.md <<EOF
          ## Release Metadata

          - Tag: \`${GITHUB_REF_NAME}\`
          - Package version: \`${{ steps.validate.outputs.package_version }}\`
          - Commit: \`${GITHUB_SHA}\`
          - Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}\`
          - Image digest: \`${{ steps.build_push.outputs.digest }}\`

          ## Generated Notes

          EOF
          cat generated-release-notes.md >> release-body.md

          cat > release-metadata.json <<EOF
          {
            "tag": "${GITHUB_REF_NAME}",
            "packageVersion": "${{ steps.validate.outputs.package_version }}",
            "commitSha": "${GITHUB_SHA}",
            "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}",
            "imageDigest": "${{ steps.build_push.outputs.digest }}",
            "runId": "${GITHUB_RUN_ID}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "workflow": "${GITHUB_WORKFLOW}"
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          files: release-metadata.json
          generate_release_notes: false

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata-${{ github.ref_name }}
          path: |
            release-body.md
            release-metadata.json

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Release Published"
            echo
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME}\`"
            echo "- Digest: \`${{ steps.build_push.outputs.digest }}\`"
            echo "- Release URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}"
          } >> "${GITHUB_STEP_SUMMARY}"
